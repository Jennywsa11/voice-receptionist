<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowUp Hair Salon - AI Voice Receptionist</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #45a049;
        }
        button.active {
            background-color: #f44336;
        }
        button.active:hover {
            background-color: #d32f2f;
        }
        .status {
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>GlowUp Hair Salon</h1>
        <p>AI-powered voice receptionist that handles customer calls and books appointments.</p>
        <button id="callButton">Call Now</button>
        <p id="status" class="status"></p>
    </div>

    <script src="https://retell-sdk.s3.us-west-2.amazonaws.com/retell-client-js-sdk.js"></script>
    <script>
        const callButton = document.getElementById('callButton');
        const status = document.getElementById('status');

        let client = null;
        let isCalling = false;

        callButton.addEventListener('click', async () => {
            if (!isCalling) {
                await startCall();
            } else {
                endCall();
            }
        });

        async function startCall() {
            status.textContent = 'Connecting...';
            callButton.disabled = true;

            try {
                const response = await fetch('/create-call', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    console.error("API ERROR:", data);
                    throw new Error(data?.message || 'Failed to create call');
                }

                console.log("SUCCESS:", data);

                const accessToken = data.access_token;

                const createClient = () => {
                    const sdk = window.RetellWebClient || window.Retell;
                    const candidate = [
                        sdk,
                        sdk?.default,
                        sdk?.RetellWebClient,
                        sdk?.WebClient,
                        sdk?.RetellClient
                    ].find(item => typeof item === 'function');

                    if (candidate) {
                        return new candidate();
                    }

                    if (sdk && typeof sdk.create === 'function') {
                        return sdk.create();
                    }

                    console.error('Retell SDK exports:', window.RetellWebClient, window.Retell);
                    throw new Error('Unable to instantiate Retell SDK client');
                };

                client = createClient();

                client.on('call_started', () => {
                    isCalling = true;
                    callButton.textContent = 'End Call';
                    callButton.classList.add('active');
                    callButton.disabled = false;
                    status.textContent = 'Connected - speak now';
                });

                client.on('call_ended', () => {
                    isCalling = false;
                    callButton.textContent = 'Call Now';
                    callButton.classList.remove('active');
                    status.textContent = 'Call ended. Thank you!';
                    client = null;
                });

                await client.startCall({
                    accessToken: accessToken
                });

            } catch (error) {
                console.error('Error starting call:', error);
                status.textContent = 'Failed to start call. Check console (F12)';
                callButton.disabled = false;
            }
        }

        function endCall() {
            if (client) {
                client.stopCall();
            }
        }
    </script>
</body>
</html>
